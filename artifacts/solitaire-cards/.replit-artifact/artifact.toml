kind = "web"
previewPath = "/"
title = "SolitaireCards"
version = "1.0.0"
id = "artifacts/solitaire-cards"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26092
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/solitaire-cards run dev"

[services.env]
PORT = "26092"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/solitaire-cards", "run", "build"]
publicDir = "artifacts/solitaire-cards/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
